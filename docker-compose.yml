services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: outbreak-backend
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - DATA_DIR=/app/data
    volumes:
      - ./backend/data:/app/data:ro
      - ./backend/output:/app/output
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - outbreak-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: outbreak-frontend
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - outbreak-network
    restart: unless-stopped

networks:
  outbreak-network:
    driver: bridge